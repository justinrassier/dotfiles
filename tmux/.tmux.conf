# set-option -g default-shell /bin/zsh


unbind C-b
set -g prefix C-b
bind C-b send-prefix

# stops conflict with vim escape
set -g escape-time 10


bind r source-file ~/.tmux.conf


set -g mouse on

# vim keymaps for pane switching
set -g mode-keys vi
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R


# make copy more vim like
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"


# Pane splits should open to the same path as the current pane
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Windows should open to the same path as the current pane
bind c new-window -c "#{pane_current_path}"



#plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dracula/tmux'


# status bar settings
set -g @dracula-show-powerline true
set -g @dracula-plugins "time"
set -g @dracular-show-flags true
set -g @dracula-show-left-icon session
set -g status-position bottom

run '~/.tmux/plugins/tpm/tpm'

# Resize bindings (after TPM to take precedence over vim-tmux-navigator)
bind-key -r -T prefix       C-k           resize-pane -U 3
bind-key -r -T prefix       C-j           resize-pane -D 3
bind-key -r -T prefix       C-h           resize-pane -L 3
bind-key -r -T prefix       C-l           resize-pane -R 3

